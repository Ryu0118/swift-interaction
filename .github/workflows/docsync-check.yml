name: Docsync Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docsync:
    name: Docsync Check
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Bootstrap dev tools
        run: ./scripts/nest.sh bootstrap nestfile.yaml

      - name: Check doc sync
        run: .nest/bin/docsync check --config docsync.yml
