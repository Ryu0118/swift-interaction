    points changed.
  checksum: 50aa032c136a6e5d244ee18bf20d06269c7337d1f279dd7a86e0f998498b1559
- name: agents-project
  sources:
  - Package.swift
  - Sources/Interaction/Terminal.swift
  - Sources/Interaction/Terminal+LineMode.swift
  doc: AGENTS.md
