rules:
- name: readme-api
  sources:
  - Sources/Interaction/Prompts/Prompt.swift
  - Sources/Interaction/Styling/StyledText.swift
  - Sources/Interaction/Table.swift
  - Sources/Interaction/Validation.swift
  doc: README.md
  message: Public Interaction API changed - review README usage snippets and update
    if the prompt/choice/table/validation surface changed.
  checksum: cd068c7249c1570b9b0089b2e43658b5fb830689f33999755fae02d5e2e3da7b
- name: readme-agent-integrations
  sources:
  - .claude/plugins/interaction/.claude-plugin/plugin.json
  - skills/interaction-guide/SKILL.md
  - plugins/interaction/.codex-plugin/plugin.json
  - .agents/plugins/marketplace.json
  doc: README.md
  message: Agent skill/plugin surface changed - review README Quick Start for Agents
    and update if Claude Code / Codex plugin usage changed.
  checksum: ac23242a8c56632548e0320f089fb03e08eaa2a00234711ab388868af538af77
- name: docc-landing
  sources:
  - Sources/Interaction/Prompts/Prompt.swift
  - Sources/Interaction/Styling/StyledText.swift
  - Sources/Interaction/Table.swift
  doc: Sources/Interaction/Interaction.docc/Interaction.md
  message: Public API changed - update the DocC landing page Topics if public entry
    points changed.
  checksum: 49bb2a47580607b57edcef100406d00be81b0f4693a8aa6f99cff35442c65176
- name: agents-project
  sources:
  - Package.swift
  - Sources/Interaction/Terminal.swift
  - Sources/Interaction/Terminal+LineMode.swift
  doc: AGENTS.md
  message: Directory structure, entry point, or module layout changed - update AGENTS.md/CLAUDE.md
    if agent guidance changed.
  checksum: bbd232d8c32a10235a21d4639671d33b69e0b122be17d38c7a2974cba7bfda87
excludes:
- .build/**
- '**/.build/**'
- .swiftpm/**
- '**/.swiftpm/**'
- .nest/**
- .git/**
- '**/.DS_Store'
