included_paths:
  - "Sources/**/*.swift"
  - "Tests/**/*.swift"

excluded_paths:
  - ".build/**"
  - ".swiftpm/**"
  - ".nest/**"
  - "**/.build/**"
  - "**/.swiftpm/**"
  - "**/Generated/**"
  - "**/Fixtures/**"

rules:
  deep-nesting:
    args:
      warning_depth: 4
      error_depth: 4
      severity: error
    include:
      - "Sources/**"
      - "Tests/**"
  single-large-type-per-file:
    args:
      warning_lines: 50
      error_lines: 50
      severity: error
    include:
      - "Sources/**"
      - "Tests/**"
    exclude:
      - "**/*Generated.swift"
      - "**/Fixtures/**"
  property-declaration-ordering:
    args:
      severity: error
  function-access-modifier-grouping:
    args:
      severity: error
  swiftui-view-property:
    args:
      severity: error
  branch-assignment-to-tuple:
    args:
      severity: error
  no-top-level-function:
    args:
      severity: error
  return-if-expression:
    args:
      severity: error
  return-switch-expression:
    args:
      severity: error
  use-url-file-path:
    args:
      severity: error

  missing-docs:
    args:
      min_access_level: package
      severity: error
      ignore_patterns:
        - kinds: [init]
        - kinds: [enum]
          names: [CodingKeys]
        - kinds: [var]
          names: [errorDescription]
        - kinds: [func]
          names: ["=="]
        - kinds: [func]
          name_pattern: "^(buildBlock|buildExpression|buildOptional|buildEither|buildArray|appendLiteral|appendInterpolation)$"
    include:
      - "Sources/Interaction/**"
    exclude:
      - "**/*Generated.swift"
